async function generateExportPDF() {
  if (!window.jspdf || !window.jspdf.jsPDF) {

  // Buscar bandeiras — SVG convertido em canvas (qualidade vetorial, sem pixels)
  const flagCodes = { rj:'br', eua:'us', europa:'eu', argentina:'ar', chile:'cl', uruguai:'uy' };
  const flagImgs = {};
  const svgToPng = (svgText, w, h) => new Promise((res, rej) => {
    const blob = new Blob([svgText], {type:'image/svg+xml;charset=utf-8'});
    const url  = URL.createObjectURL(blob);
    const img  = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      res(c.toDataURL('image/png'));
    };
    img.onerror = rej;
    img.src = url;
  });
  await Promise.all(Object.entries(flagCodes).map(async ([key, code]) => {
    try {
      const resp = await fetch('https://flagcdn.com/'+code+'.svg');
      if (!resp.ok) throw new Error();
      const svgText = await resp.text();
      flagImgs[key] = await svgToPng(svgText, 400, 267);
    } catch(e) {
      try {
        const r2 = await fetch('https://flagcdn.com/w320/'+code+'.png');
        const bl = await r2.blob();
        flagImgs[key] = await new Promise(res => { const rd=new FileReader(); rd.onload=()=>res(rd.result); rd.readAsDataURL(bl); });
      } catch(e2) {}
    }
  }));

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  // Stolzl via fetch + FileReader (async, nao bloqueia UI)

    const reader = new FileReader();

  let FONT = 'helvetica';

    const baseUrl = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '');

      },
