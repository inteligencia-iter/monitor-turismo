async function generateExportPDF() {
  if (!window.jspdf || !window.jspdf.jsPDF) {
    alert('Biblioteca PDF ainda carregando. Aguarde um instante e tente novamente.');
    return;
  }

  // Buscar bandeiras — SVG convertido em canvas (qualidade vetorial, sem pixels)
  const flagCodes = { rj:'br', eua:'us', europa:'eu', argentina:'ar', chile:'cl', uruguai:'uy' };
  const flagImgs = {};
  const svgToPng = (svgText, w, h) => new Promise((res, rej) => {
    const blob = new Blob([svgText], {type:'image/svg+xml;charset=utf-8'});
    const url  = URL.createObjectURL(blob);
    const img  = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      res(c.toDataURL('image/png'));
    };
    img.onerror = rej;
    img.src = url;
  });
  await Promise.all(Object.entries(flagCodes).map(async ([key, code]) => {
    try {
      const resp = await fetch('https://flagcdn.com/'+code+'.svg');
      if (!resp.ok) throw new Error();
      const svgText = await resp.text();
      flagImgs[key] = await svgToPng(svgText, 400, 267);
    } catch(e) {
      try {
        const r2 = await fetch('https://flagcdn.com/w320/'+code+'.png');
        const bl = await r2.blob();
        flagImgs[key] = await new Promise(res => { const rd=new FileReader(); rd.onload=()=>res(rd.result); rd.readAsDataURL(bl); });
      } catch(e2) {}
    }
  }));

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  const W = 210, H = 297, ML = 14, MR = 14, CW = W - ML - MR;
  const C = {
    navy:[15,41,66], navyL:[26,63,98], teal:[0,151,167], tealL:[0,188,206],
    slate:[100,116,139], dark:[30,41,59], white:[255,255,255],
    light:[247,250,252], lite2:[238,244,250],
    green:[5,150,105], red:[220,38,38], amber:[217,119,6], border:[226,232,240],

      doc.setFillColor(255,204,0);

        const sa=(s*Math.PI/6)-Math.PI/2;
        const scx2=ecx+eR*Math.cos(sa), scy2=ecy+eR*Math.sin(sa);
        const spts=[];
        for(let p=0;p<10;p++){const r=p%2===0?esr:esi;const a=(p*Math.PI/5)-Math.PI/2;spts.push([scx2+r*Math.cos(a),scy2+r*Math.sin(a)]);}
        const sdl=[];
        for(let p=1;p<spts.length;p++)sdl.push([spts[p][0]-spts[p-1][0],spts[p][1]-spts[p-1][1]]);
        doc.lines(sdl,spts[0][0],spts[0][1],[1,1],'F',true);
